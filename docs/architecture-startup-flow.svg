<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 720">
  <style>
    text { font-family: "PingFang SC", "Microsoft YaHei", "Helvetica Neue", Helvetica, Arial, sans-serif; }
    .title { font-size: 18px; font-weight: 600; fill: #111827; }
    .subtitle { font-size: 14px; font-weight: 600; fill: #374151; }
    .label { font-size: 13px; fill: #111827; }
    .small-label { font-size: 11px; fill: #6b7280; }
    .step-num { font-size: 16px; fill: #2563eb; font-weight: 700; }
    .step-text { font-size: 13px; fill: #1f2937; }
    .code-text { font-family: "SF Mono", "Menlo", "Monaco", monospace; font-size: 11px; fill: #4b5563; }
    .box { fill: #ffffff; stroke: #d1d5db; stroke-width: 1.5; }
    .box-teal { fill: #f0fdfa; stroke: #14b8a6; stroke-width: 2; }
    .box-blue { fill: #eff6ff; stroke: #3b82f6; stroke-width: 2; }
    .step-box { fill: #ffffff; stroke: #e5e7eb; stroke-width: 1; }
  </style>
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrow-gray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.1"/>
    </filter>
  </defs>
  <rect width="960" height="720" fill="#ffffff"/>
  <text x="480" y="35" text-anchor="middle" class="title">0G Citizen Claw - 启动流程</text>
  <!-- 0g-sandbox TEE Container -->
  <rect x="80" y="70" width="800" height="600" rx="12" class="box-teal" filter="url(#shadow)"/>
  <text x="105" y="105" class="subtitle" fill="#0f766e">0g-sandbox (TEE Environment)</text>
  <rect x="105" y="120" width="280" height="35" rx="4" fill="#fffbeb" stroke="#fcd34d" stroke-width="1"/>
  <text x="120" y="143" class="label">启动容器 → 只包含 wrapper + 基础运行时</text>
  <line x1="245" y1="155" x2="245" y2="185" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow-gray)"/>
  <!-- Agent Wrapper Box -->
  <rect x="105" y="185" width="750" height="460" rx="8" class="box-blue" filter="url(#shadow)"/>
  <text x="130" y="220" class="subtitle" fill="#1e40af">Agent Wrapper (Go binary)</text>
  <!-- Step 1 -->
  <rect x="130" y="240" width="700" height="55" rx="6" class="step-box"/>
  <circle cx="160" cy="267" r="16" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="160" y="273" text-anchor="middle" class="step-num">1</text>
  <text x="190" y="265" class="step-text">远程证明</text>
  <text x="190" y="282" class="small-label">Attestor.Attest(sealId) → 获取 agentSeal 私钥 (保存在 TEE 内存)</text>
  <!-- Step 2 -->
  <rect x="130" y="305" width="700" height="55" rx="6" class="step-box"/>
  <circle cx="160" cy="332" r="16" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="160" y="338" text-anchor="middle" class="step-num">2</text>
  <text x="190" y="330" class="step-text">从链上获取 Agent Metadata</text>
  <text x="310" y="330" class="code-text">{</text>
  <text x="325" y="347" class="code-text">"agentId": "0x123...", "configHash": "0xabc...", "framework": "openclaw"</text>
  <text x="680" y="347" class="code-text">}</text>
  <!-- Step 3 -->
  <rect x="130" y="370" width="700" height="55" rx="6" class="step-box"/>
  <circle cx="160" cy="397" r="16" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="160" y="403" text-anchor="middle" class="step-num">3</text>
  <text x="190" y="395" class="step-text">根据框架类型动态拉取</text>
  <text x="370" y="395" class="code-text" fill="#9333ea">"openclaw"</text>
  <text x="445" y="395" class="small-label">→ pip install openclaw==1.2.0</text>
  <!-- Step 4 -->
  <rect x="130" y="435" width="700" height="55" rx="6" class="step-box"/>
  <circle cx="160" cy="462" r="16" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="160" y="468" text-anchor="middle" class="step-num">4</text>
  <text x="190" y="460" class="step-text">从 0G Storage 获取加密配置</text>
  <text x="390" y="460" class="small-label">Storage.Fetch(configHash)</text>
  <text x="190" y="477" class="small-label" fill="#6b7280">使用 agentSeal 私钥解密 → agentCode, entryPoint, env, frameworkConfig</text>
  <!-- Step 5 -->
  <rect x="130" y="500" width="700" height="55" rx="6" class="step-box"/>
  <circle cx="160" cy="527" r="16" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="160" y="533" text-anchor="middle" class="step-num">5</text>
  <text x="190" y="525" class="step-text">解密配置 → 启动</text>
  <text x="285" y="525" class="code-text" fill="#9333ea">openclaw</text>
  <text x="355" y="525" class="small-label">进程</text>
  <text x="190" y="542" class="code-text">exec: python -m openclaw run /app/agent.py</text>
  <!-- Step 6 -->
  <rect x="130" y="565" width="700" height="65" rx="6" class="step-box"/>
  <circle cx="160" cy="597" r="16" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="160" y="603" text-anchor="middle" class="step-num" fill="#16a34a">6</text>
  <text x="190" y="595" class="step-text">HTTP 代理</text>
  <text x="265" y="595" class="code-text">←→</text>
  <text x="295" y="595" class="code-text" fill="#9333ea">openclaw</text>
  <text x="190" y="612" class="small-label">用户请求 → Proxy → openclaw 处理 → Proxy 返回响应</text>
  <text x="190" y="625" class="small-label">所有响应由 Signer 签名: Sign(agentId, sealId, timestamp, response)</text>
  <!-- Step connection arrows -->
  <line x1="245" y1="295" x2="245" y2="305" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <line x1="245" y1="360" x2="245" y2="370" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <line x1="245" y1="425" x2="245" y2="435" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <line x1="245" y1="490" x2="245" y2="500" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <line x1="245" y1="555" x2="245" y2="565" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <!-- Legend -->
  <rect x="80" y="685" width="800" height="25" rx="4" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <circle cx="110" cy="697" r="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="125" y="701" class="small-label">初始化步骤</text>
  <circle cx="220" cy="697" r="8" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="235" y="701" class="small-label">运行状态</text>
  <text x="700" y="701" class="small-label" fill="#dc2626">⚠️ Private Key 永不离开 TEE</text>
</svg>