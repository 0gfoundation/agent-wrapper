<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1400">
  <style>
    text { font-family: "PingFang SC", "Microsoft YaHei", "Helvetica Neue", Helvetica, Arial, sans-serif; }
    .title { font-size: 20px; font-weight: 600; fill: #111827; }
    .subtitle { font-size: 15px; font-weight: 600; fill: #374151; }
    .label { font-size: 13px; fill: #111827; }
    .small-label { font-size: 11px; fill: #6b7280; }
    .step-label { font-size: 11px; fill: #2563eb; font-weight: 600; }
    .box { fill: #ffffff; stroke: #d1d5db; stroke-width: 1.5; }
    .box-teal { fill: #f0fdfa; stroke: #99f6e4; stroke-width: 1.5; }
    .box-blue { fill: #eff6ff; stroke: #bfdbfe; stroke-width: 1.5; }
    .box-purple { fill: #faf5ff; stroke: #e9d5ff; stroke-width: 1.5; }
    .box-orange { fill: #fff7ed; stroke: #fed7aa; stroke-width: 1.5; }
    .box-green { fill: #f0fdf4; stroke: #dcfce7; stroke-width: 1.5; }
    .container { fill: none; stroke: #d1d5db; stroke-width: 2; stroke-dasharray: 8,4; }
    .container-solid { fill: #f9fafb; stroke: #d1d5db; stroke-width: 2; }
  </style>
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrow-gray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#059669"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ea580c"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#9333ea"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
  </defs>
  <rect width="1200" height="1400" fill="#ffffff"/>
  <text x="600" y="35" text-anchor="middle" class="title">0G Citizen Claw - Agent Wrapper 完整架构图</text>
  <!-- Layer 1: External World -->
  <rect x="60" y="60" width="1080" height="110" rx="8" class="container-solid" filter="url(#shadow)"/>
  <text x="85" y="88" class="subtitle">外部世界 External World</text>
  <rect x="100" y="105" width="140" height="45" rx="6" class="box-orange"/>
  <text x="170" y="133" text-anchor="middle" class="label">Agent 开发者</text>
  <rect x="320" y="105" width="140" height="45" rx="6" class="box-teal"/>
  <text x="390" y="133" text-anchor="middle" class="label">0g-sandbox</text>
  <rect x="540" y="105" width="140" height="45" rx="6" class="box-blue"/>
  <text x="610" y="133" text-anchor="middle" class="label">用户请求</text>
  <!-- Layer 2: 0g-sandbox TEE Environment -->
  <rect x="60" y="200" width="1080" height="860" rx="8" fill="#f0fdfa" stroke="#14b8a6" stroke-width="2" filter="url(#shadow)"/>
  <text x="85" y="230" class="subtitle" fill="#0f766e">0g-sandbox TEE Environment</text>
  <rect x="85" y="250" width="200" height="110" rx="6" fill="#fffbeb" stroke="#fcd34d" stroke-width="1.5"/>
  <text x="100" y="275" class="small-label" font-weight="600">环境变量</text>
  <text x="100" y="275" class="small-label" font-weight="600">Environment Variables</text>
  <text x="100" y="300" class="small-label">SEAL_ID</text>
  <text x="100" y="320" class="small-label">ATTESTOR_ENDPOINT</text>
  <text x="100" y="340" class="small-label">ATTESTOR_TOKEN</text>
  <rect x="320" y="250" width="800" height="790" rx="8" class="container"/>
  <text x="345" y="280" class="subtitle">Agent Wrapper (Go)</text>
  <!-- Bootstrap/Init Section -->
  <rect x="345" y="300" width="750" height="380" rx="6" class="box-blue"/>
  <text x="370" y="330" class="label" font-weight="600">Bootstrap / Init 初始化流程</text>
  <rect x="370" y="350" width="280" height="40" rx="4" fill="#ffffff" stroke="#d1d5db" stroke-width="1"/>
  <text x="385" y="375" class="step-label">①</text>
  <text x="410" y="375" class="small-label">Attestor.Attest(sealId, tempKey)</text>
  <rect x="370" y="405" width="280" height="40" rx="4" fill="#ffffff" stroke="#d1d5db" stroke-width="1"/>
  <text x="385" y="430" class="step-label">②</text>
  <text x="410" y="430" class="small-label">SealBonded(sealId) → agentId</text>
  <rect x="370" y="460" width="280" height="40" rx="4" fill="#ffffff" stroke="#d1d5db" stroke-width="1"/>
  <text x="385" y="485" class="step-label">③</text>
  <text x="410" y="485" class="small-label">Attestor.GetKey(token)</text>
  <rect x="680" y="460" width="390" height="40" rx="4" fill="#fef2f2" stroke="#fecaca" stroke-width="1"/>
  <text x="700" y="485" class="small-label" fill="#dc2626">返回: agentSealPrivateKey (PEM)</text>
  <rect x="370" y="515" width="280" height="40" rx="4" fill="#ffffff" stroke="#d1d5db" stroke-width="1"/>
  <text x="385" y="540" class="step-label">④</text>
  <text x="410" y="540" class="small-label">获取 Agent Metadata (链上)</text>
  <rect x="680" y="515" width="390" height="40" rx="4" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="700" y="540" class="small-label">{configHash: "0xabc...", ...}</text>
  <rect x="370" y="570" width="280" height="40" rx="4" fill="#ffffff" stroke="#d1d5db" stroke-width="1"/>
  <text x="385" y="595" class="step-label">⑤</text>
  <text x="410" y="595" class="small-label">Storage.FetchConfig(configHash)</text>
  <rect x="370" y="625" width="700" height="50" rx="4" fill="#ffffff" stroke="#d1d5db" stroke-width="1"/>
  <text x="385" y="645" class="step-label">⑥</text>
  <text x="410" y="645" class="small-label">解密配置 (使用 agentSealPrivateKey):</text>
  <text x="410" y="662" class="small-label">{entryPoint, agentCode(base64), env, frameworkConfig}</text>
  <!-- Framework Installation Section -->
  <rect x="345" y="695" width="750" height="140" rx="6" class="box-purple"/>
  <text x="370" y="725" class="label" font-weight="600">Framework Installation 框架安装</text>
  <rect x="370" y="745" width="280" height="35" rx="4" fill="#ffffff" stroke="#d1d5db" stroke-width="1"/>
  <text x="385" y="767" class="step-label">⑦</text>
  <text x="410" y="767" class="small-label">Detect framework type</text>
  <rect x="680" y="745" width="390" height="35" rx="4" fill="#f3f4f6" stroke="#e5e7eb" stroke-width="1"/>
  <text x="700" y="767" class="small-label">openclaw / eliza / custom</text>
  <rect x="370" y="790" width="280" height="35" rx="4" fill="#ffffff" stroke="#d1d5db" stroke-width="1"/>
  <text x="385" y="812" class="step-label">⑧</text>
  <text x="410" y="812" class="small-label">Extract agentCode + Launch framework</text>
  <rect x="680" y="790" width="390" height="35" rx="4" fill="#f3f4f6" stroke="#e5e7eb" stroke-width="1"/>
  <text x="700" y="812" class="small-label">exec: python -m openclaw run /app/agent.py</text>
  <!-- Runtime Section -->
  <rect x="345" y="845" width="750" height="170" rx="6" class="box-green"/>
  <text x="370" y="875" class="label" font-weight="600">Runtime 运行时</text>
  <rect x="370" y="895" width="140" height="45" rx="4" fill="#ffffff" stroke="#d1d5db" stroke-width="1"/>
  <text x="440" y="920" text-anchor="middle" class="small-label" font-weight="600">HTTP Proxy</text>
  <text x="440" y="933" text-anchor="middle" class="small-label">/chat handler</text>
  <rect x="530" y="895" width="140" height="45" rx="4" fill="#ffffff" stroke="#d1d5db" stroke-width="1"/>
  <text x="600" y="920" text-anchor="middle" class="small-label" font-weight="600">Heartbeat</text>
  <text x="600" y="933" text-anchor="middle" class="small-label">定期上报</text>
  <rect x="690" y="895" width="140" height="45" rx="4" fill="#ffffff" stroke="#d1d5db" stroke-width="1"/>
  <text x="760" y="920" text-anchor="middle" class="small-label" font-weight="600">Signer</text>
  <text x="760" y="933" text-anchor="middle" class="small-label">ECDSA P-256</text>
  <rect x="370" y="955" width="700" height="50" rx="4" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="720" y="980" text-anchor="middle" class="small-label" font-weight="600">↓ 下游 Agent 框架 (完全无感知 Wrapper 的存在)</text>
  <text x="720" y="995" text-anchor="middle" class="small-label">接收 /chat 请求 → 处理 → 返回响应</text>
  <!-- Layer 3: External Services -->
  <rect x="60" y="1080" width="1080" height="170" rx="8" class="container-solid" filter="url(#shadow)"/>
  <text x="85" y="1110" class="subtitle">外部服务 External Services</text>
  <rect x="100" y="1130" width="180" height="100" rx="6" class="box-orange"/>
  <text x="190" y="1160" text-anchor="middle" class="label" font-weight="600">Attestor</text>
  <text x="190" y="1164" text-anchor="middle" class="label" font-weight="600">Service</text>
  <text x="190" y="1185" text-anchor="middle" class="small-label">/attest</text>
  <text x="190" y="1202" text-anchor="middle" class="small-label">/key</text>
  <text x="190" y="1219" text-anchor="middle" class="small-label">/heartbeat</text>
  <rect x="340" y="1130" width="180" height="100" rx="6" class="box-teal"/>
  <text x="430" y="1160" text-anchor="middle" class="label" font-weight="600">0G Storage</text>
  <text x="430" y="1185" text-anchor="middle" class="small-label">加密配置存储</text>
  <text x="430" y="1202" text-anchor="middle" class="small-label">/fetch</text>
  <text x="430" y="1219" text-anchor="middle" class="small-label">root of trust</text>
  <rect x="580" y="1130" width="180" height="100" rx="6" class="box-blue"/>
  <text x="670" y="1160" text-anchor="middle" class="label" font-weight="600">Blockchain</text>
  <text x="670" y="1185" text-anchor="middle" class="small-label">Agent metadata</text>
  <text x="670" y="1202" text-anchor="middle" class="small-label">seal→agent 绑定</text>
  <!-- Arrows Layer -->
  <path d="M170 150 L170 200" stroke="#6b7280" stroke-width="1.5" fill="none" marker-end="url(#arrow-gray)"/>
  <rect x="130" y="165" width="80" height="18" fill="#ffffff" rx="2" stroke="#e5e7eb" stroke-width="0.5"/>
  <text x="170" y="178" text-anchor="middle" class="small-label">1. 注册Agent</text>
  <path d="M390 150 L390 200" stroke="#6b7280" stroke-width="1.5" fill="none" marker-end="url(#arrow-gray)"/>
  <rect x="350" y="165" width="80" height="18" fill="#ffffff" rx="2" stroke="#e5e7eb" stroke-width="0.5"/>
  <text x="390" y="178" text-anchor="middle" class="small-label">2. 启动容器</text>
  <path d="M610 150 L610 175 L440 175 L440 915" stroke="#2563eb" stroke-width="2" fill="none" marker-end="url(#arrow-blue)"/>
  <rect x="570" y="155" width="80" height="18" fill="#ffffff" rx="2" stroke="#e5e7eb" stroke-width="0.5"/>
  <text x="610" y="168" text-anchor="middle" class="small-label" fill="#2563eb">8. /chat</text>
  <path d="M510 390 L510 405" stroke="#2563eb" stroke-width="1.5" fill="none" marker-end="url(#arrow-blue)"/>
  <path d="M510 445 L510 460" stroke="#2563eb" stroke-width="1.5" fill="none" marker-end="url(#arrow-blue)"/>
  <path d="M510 500 L510 515" stroke="#2563eb" stroke-width="1.5" fill="none" marker-end="url(#arrow-blue)"/>
  <path d="M510 555 L510 570" stroke="#2563eb" stroke-width="1.5" fill="none" marker-end="url(#arrow-blue)"/>
  <path d="M510 610 L510 625" stroke="#2563eb" stroke-width="1.5" fill="none" marker-end="url(#arrow-blue)"/>
  <path d="M720 675 L720 695" stroke="#9333ea" stroke-width="1.5" fill="none" marker-end="url(#arrow-purple)"/>
  <path d="M720 835 L720 845" stroke="#9333ea" stroke-width="1.5" fill="none" marker-end="url(#arrow-purple)"/>
  <!-- Connection to Attestor: attest -->
  <path d="M370 370 L340 370 L340 1090 L190 1090 L190 1130" stroke="#ea580c" stroke-width="1.5" fill="none" marker-end="url(#arrow-orange)" stroke-dasharray="4,2"/>
  <rect x="245" y="362" width="50" height="16" fill="#ffffff" rx="2" stroke="#fed7aa" stroke-width="0.5"/>
  <text x="270" y="374" text-anchor="middle" class="small-label" fill="#ea580c">attest</text>
  <!-- Connection to Attestor: get key -->
  <path d="M650 480 L680 480 L680 1060 L190 1060 L190 1130" stroke="#059669" stroke-width="1.5" fill="none" marker-end="url(#arrow-green)" stroke-dasharray="4,2"/>
  <rect x="685" y="472" width="40" height="16" fill="#ffffff" rx="2" stroke="#86efac" stroke-width="0.5"/>
  <text x="705" y="484" text-anchor="middle" class="small-label" fill="#059669">key</text>
  <!-- Connection to Blockchain: metadata -->
  <path d="M650 535 L820 535 L820 1070 L670 1070 L670 1130" stroke="#6b7280" stroke-width="1.5" fill="none" marker-end="url(#arrow-gray)" stroke-dasharray="4,2"/>
  <rect x="730" y="527" width="60" height="16" fill="#ffffff" rx="2" stroke="#d1d5db" stroke-width="0.5"/>
  <text x="760" y="539" text-anchor="middle" class="small-label">metadata</text>
  <!-- Connection to 0G Storage: fetch config -->
  <path d="M650 590 L780 590 L780 1080 L430 1080 L430 1130" stroke="#2563eb" stroke-width="1.5" fill="none" marker-end="url(#arrow-blue)" stroke-dasharray="4,2"/>
  <rect x="790" y="582" width="60" height="16" fill="#ffffff" rx="2" stroke="#bfdbfe" stroke-width="0.5"/>
  <text x="820" y="594" text-anchor="middle" class="small-label" fill="#2563eb">fetch</text>
  <!-- Heartbeat to Attestor -->
  <path d="M600 940 L600 1030 L190 1030 L190 1130" stroke="#059669" stroke-width="1.5" fill="none" marker-end="url(#arrow-green)" stroke-dasharray="4,2"/>
  <rect x="350" y="1022" width="70" height="16" fill="#ffffff" rx="2" stroke="#86efac" stroke-width="0.5"/>
  <text x="385" y="1034" text-anchor="middle" class="small-label" fill="#059669">heartbeat</text>
  <!-- Legend -->
  <rect x="60" y="1270" width="1080" height="70" rx="6" fill="#f9fafb" stroke="#d1d5db" stroke-width="1"/>
  <text x="80" y="1295" class="small-label" font-weight="600" font-size="12">图例 Legend:</text>
  <line x1="180" y1="1290" x2="220" y2="1290" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <text x="225" y="1294" class="small-label">主流程/请求</text>
  <line x1="330" y1="1290" x2="370" y2="1290" stroke="#9333ea" stroke-width="1.5" marker-end="url(#arrow-purple)"/>
  <text x="375" y="1294" class="small-label">内部流程</text>
  <line x1="460" y1="1290" x2="500" y2="1290" stroke="#ea580c" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrow-orange)"/>
  <text x="505" y="1294" class="small-label">认证/签名</text>
  <line x1="590" y1="1290" x2="630" y2="1290" stroke="#059669" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="635" y="1294" class="small-label">心跳/安全</text>
  <line x1="720" y1="1290" x2="760" y2="1290" stroke="#6b7280" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrow-gray)"/>
  <text x="765" y="1294" class="small-label">数据查询</text>
  <text x="80" y="1315" class="small-label" fill="#dc2626" font-weight="600">⚠️ 安全注意事项:</text>
  <text x="80" y="1330" class="small-label" fill="#dc2626">• agentSealPrivateKey 永不离开 TEE 内存</text>
  <text x="400" y="1330" class="small-label" fill="#dc2626">• 所有签名操作在 TEE 内完成</text>
  <text x="700" y="1330" class="small-label" fill="#dc2626">• 远程认证确保 TEE 状态可信</text>
</svg>