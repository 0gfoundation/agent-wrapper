<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 700">
  <defs>
  <style>
    .title { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 20px; font-weight: 600; fill: #1e293b; }
    .actor { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 14px; font-weight: 600; fill: #1e293b; }
    .label { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 12px; fill: #475569; }
    .note-bg { fill: #fef3c7; stroke: #fbbf24; stroke-width: 1; }
    .note-text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 11px; fill: #92400e; }
  </style>
  <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
  </marker>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.1"/>
  </filter>
</defs>
  <rect width="960" height="700" fill="#ffffff"/>
  <text x="480" y="40" text-anchor="middle" class="title">Agent Metadata 查询流程</text>
  <rect x="70" y="80" width="100" height="40" rx="8" fill="#3b82f6" filter="url(#shadow)"/>
  <text x="120" y="105" text-anchor="middle" class="actor" fill="#ffffff">User / Client</text>
  <line x1="120" y1="120" x2="120" y2="620" stroke="#94a3b8" stroke-width="1" stroke-dasharray="5,5"/>
  <rect x="250" y="80" width="100" height="40" rx="8" fill="#3b82f6" filter="url(#shadow)"/>
  <text x="300" y="105" text-anchor="middle" class="actor" fill="#ffffff">Agent Wrapper</text>
  <line x1="300" y1="120" x2="300" y2="620" stroke="#94a3b8" stroke-width="1" stroke-dasharray="5,5"/>
  <rect x="430" y="80" width="100" height="40" rx="8" fill="#3b82f6" filter="url(#shadow)"/>
  <text x="480" y="105" text-anchor="middle" class="actor" fill="#ffffff">Blockchain Service</text>
  <line x1="480" y1="120" x2="480" y2="620" stroke="#94a3b8" stroke-width="1" stroke-dasharray="5,5"/>
  <rect x="610" y="80" width="100" height="40" rx="8" fill="#3b82f6" filter="url(#shadow)"/>
  <text x="660" y="105" text-anchor="middle" class="actor" fill="#ffffff">0G Storage</text>
  <line x1="660" y1="120" x2="660" y2="620" stroke="#94a3b8" stroke-width="1" stroke-dasharray="5,5"/>
  <rect x="790" y="80" width="100" height="40" rx="8" fill="#3b82f6" filter="url(#shadow)"/>
  <text x="840" y="105" text-anchor="middle" class="actor" fill="#ffffff">Crypto Module</text>
  <line x1="840" y1="120" x2="840" y2="620" stroke="#94a3b8" stroke-width="1" stroke-dasharray="5,5"/>
  <rect x="295" y="130" width="10" height="350" fill="#3b82f6"/>
  <rect x="475" y="150" width="10" height="60" fill="#22c55e"/>
  <rect x="475" y="240" width="10" height="50" fill="#22c55e"/>
  <rect x="655" y="360" width="10" height="40" fill="#f59e0b"/>
  <rect x="835" y="440" width="10" height="40" fill="#8b5cf6"/>
  <line x1="125" y1="140" x2="295" y2="140" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="165.0" y="132" width="90" height="16" rx="3" fill="#ffffff" opacity="0.9"/>
  <text x="210.0" y="144" text-anchor="middle" class="label">Init(sealId)</text>
  <line x1="305" y1="160" x2="475" y2="160" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="345.0" y="152" width="90" height="16" rx="3" fill="#ffffff" opacity="0.9"/>
  <text x="390.0" y="164" text-anchor="middle" class="label">GET /agents/by-seal-id/{sealId}</text>
  <line x1="475" y1="195" x2="305" y2="195" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="345.0" y="187" width="90" height="16" rx="3" fill="#ffffff" opacity="0.9"/>
  <text x="390.0" y="199" text-anchor="middle" class="label">{"agentId": "1"}</text>
  <line x1="305" y1="225" x2="475" y2="225" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="345.0" y="217" width="90" height="16" rx="3" fill="#ffffff" opacity="0.9"/>
  <text x="390.0" y="229" text-anchor="middle" class="label">GET /agents/{id}/intelligent-datas</text>
  <line x1="475" y1="275" x2="305" y2="275" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="345.0" y="267" width="90" height="16" rx="3" fill="#ffffff" opacity="0.9"/>
  <text x="390.0" y="279" text-anchor="middle" class="label">[{dataDescription, dataHash}]</text>
  <line x1="305" y1="325" x2="655" y2="325" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="435.0" y="317" width="90" height="16" rx="3" fill="#ffffff" opacity="0.9"/>
  <text x="480.0" y="329" text-anchor="middle" class="label">GET /config/{dataHash}</text>
  <line x1="655" y1="380" x2="305" y2="380" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="435.0" y="372" width="90" height="16" rx="3" fill="#ffffff" opacity="0.9"/>
  <text x="480.0" y="384" text-anchor="middle" class="label">Encrypted Config (AES-256-GCM)</text>
  <line x1="305" y1="460" x2="835" y2="460" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="525.0" y="452" width="90" height="16" rx="3" fill="#ffffff" opacity="0.9"/>
  <text x="570.0" y="464" text-anchor="middle" class="label">Decrypt(agentSealKey)</text>
  <line x1="835" y1="475" x2="305" y2="475" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="525.0" y="467" width="90" height="16" rx="3" fill="#ffffff" opacity="0.9"/>
  <text x="570.0" y="479" text-anchor="middle" class="label">AgentConfig</text>
  <path d="M 305 530 L 340 530 L 340 555 L 310 555" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="350" y="545" class="label">{framework, runtime, env}</text>
  <path d="M 305 570 L 340 570 L 340 595 L 310 595" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="350" y="585" class="label">Start Agent</text>
  <rect x="60" y="640" width="200" height="40" rx="4" class="note-bg"/>
  <text x="160" y="665" text-anchor="middle" class="note-text">TEE 环境内执行，私钥不外泄</text>
</svg>