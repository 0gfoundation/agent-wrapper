<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 500">
  <defs>
  <style>
    .title { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 20px; font-weight: 600; fill: #1e293b; }
    .class-name { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 15px; font-weight: 600; fill: #1e293b; }
    .field { font-family: "SF Mono", Monaco, monospace; font-size: 12px; fill: #334155; }
    .visibility { font-family: "SF Mono", Monaco, monospace; font-size: 12px; fill: #64748b; }
  </style>
  <marker id="diamond" markerWidth="16" markerHeight="12" refX="16" refY="6" orient="auto">
    <polygon points="16 6, 8 0, 0 6, 8 12" fill="#ffffff" stroke="#64748b" stroke-width="1.5"/>
  </marker>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.1"/>
  </filter>
</defs>
  <rect width="960" height="500" fill="#ffffff"/>
  <text x="480" y="40" text-anchor="middle" class="title">数据结构类图</text>
  <rect x="350" y="80" width="260" height="160" rx="4" fill="#ffffff" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)"/>
  <rect x="350" y="80" width="260" height="35" rx="4" fill="#dbeafe"/>
  <text x="480" y="103" text-anchor="middle" class="class-name">AgentMetadata</text>
  <text x="365" y="130" class="visibility">+</text>
  <text x="380" y="130" class="field">agentId: uint256</text>
  <text x="365" y="155" class="visibility">+</text>
  <text x="380" y="155" class="field">sealId: string</text>
  <text x="365" y="180" class="visibility">+</text>
  <text x="380" y="180" class="field">agentSeal: string</text>
  <text x="365" y="205" class="visibility">+</text>
  <text x="380" y="205" class="field">intelligentDatas: IntelligentData[]</text>
  <rect x="350" y="300" width="260" height="90" rx="4" fill="#ffffff" stroke="#22c55e" stroke-width="2" filter="url(#shadow)"/>
  <rect x="350" y="300" width="260" height="35" rx="4" fill="#dcfce7"/>
  <text x="480" y="323" text-anchor="middle" class="class-name">IntelligentData</text>
  <text x="365" y="350" class="visibility">+</text>
  <text x="380" y="350" class="field">dataDescription: string</text>
  <text x="365" y="375" class="visibility">+</text>
  <text x="380" y="375" class="field">dataHash: string</text>
  <line x1="480" y1="240" x2="480" y2="300" stroke="#64748b" stroke-width="1.5"/>
  <circle cx="480" cy="295" r="5" fill="#ffffff" stroke="#64748b" stroke-width="1.5"/>
  <text x="490" y="270" class="field" fill="#64748b">1..*</text>
  <text x="490" y="260" class="field" fill="#64748b">1</text>
  <rect x="700" y="400" width="200" height="70" rx="4" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="715" y="420" class="field-name" font-weight="600">Legend</text>
  <line x1="715" y1="440" x2="755" y2="440" stroke="#64748b" stroke-width="1.5"/>
  <circle cx="735" cy="440" r="4" fill="#ffffff" stroke="#64748b" stroke-width="1.5"/>
  <text x="765" y="444" class="field">Composition</text>
  <text x="715" y="462" class="visibility">+ Public</text>
</svg>