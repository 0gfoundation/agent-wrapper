<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 700">
  <defs>
  <style>
    .title { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 20px; font-weight: 600; fill: #1e293b; }
    .section-title { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 16px; font-weight: 600; fill: #1e293b; }
    .field-name { font-family: "SF Mono", Monaco, monospace; font-size: 13px; fill: #334155; }
    .field-value { font-family: "SF Mono", Monaco, monospace; font-size: 11px; fill: #64748b; }
  </style>
  <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#059669"/>
  </marker>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.1"/>
  </filter>
</defs>
  <rect width="960" height="700" fill="#ffffff"/>
  <text x="480" y="40" text-anchor="middle" class="title">链下配置结构</text>
  <rect x="60" y="80" width="300" height="200" rx="12" fill="#fffbeb" stroke="#fcd34d" stroke-width="2"/>
  <text x="210" y="110" text-anchor="middle" class="section-title">加密配置 (0G Storage)</text>
  <text x="90" y="140" class="field-name">加密算法:</text>
  <text x="270" y="140" text-anchor="end" class="field-value">AES-256-GCM</text>
  <text x="90" y="180" class="field-name">密钥:</text>
  <text x="270" y="180" text-anchor="end" class="field-value">agentSealKey</text>
  <text x="90" y="220" class="field-name">位置:</text>
  <text x="270" y="220" text-anchor="end" class="field-value">0G Storage</text>
  <path d="M 180 250 L 220 250 L 220 270 L 180 270 Z" fill="none" stroke="#f59e0b" stroke-width="2"/>
  <path d="M 185 250 L 185 240 A 15 15 0 0 1 215 240 L 215 250" fill="none" stroke="#f59e0b" stroke-width="2"/>
  <rect x="420" y="80" width="500" height="560" rx="12" fill="#f0fdf4" stroke="#86efac" stroke-width="2"/>
  <text x="670" y="110" text-anchor="middle" class="section-title">解密后配置</text>
  <rect x="450" y="140" width="440" height="130" rx="8" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
  <text x="470" y="165" class="section-title" font-size="14px">Framework</text>
  <text x="470" y="190" class="field-name">name:</text>
  <text x="860" y="190" text-anchor="end" class="field-value">openclaw | demo | eliza</text>
  <text x="470" y="220" class="field-name">version:</text>
  <text x="860" y="220" text-anchor="end" class="field-value">"0.1.0"</text>
  <rect x="450" y="280" width="440" height="130" rx="8" fill="#f3e5f5" stroke="#86efac" stroke-width="1"/>
  <text x="470" y="305" class="section-title" font-size="14px">Runtime</text>
  <text x="470" y="330" class="field-name">entryPoint:</text>
  <text x="860" y="330" text-anchor="end" class="field-value">"python3 main.py"</text>
  <text x="470" y="360" class="field-name">workingDir:</text>
  <text x="860" y="360" text-anchor="end" class="field-value">"/app"</text>
  <text x="470" y="390" class="field-name">agentPort:</text>
  <text x="860" y="390" text-anchor="end" class="field-value">9000</text>
  <rect x="450" y="420" width="440" height="130" rx="8" fill="#fff9c4" stroke="#86efac" stroke-width="1"/>
  <text x="470" y="445" class="section-title" font-size="14px">Env</text>
  <text x="470" y="470" class="field-name">LOG_LEVEL:</text>
  <text x="860" y="470" text-anchor="end" class="field-value">"info"</text>
  <text x="470" y="500" class="field-name">MODEL:</text>
  <text x="860" y="500" text-anchor="end" class="field-value">"gpt-4"</text>
  <text x="470" y="530" class="field-name">API_KEY:</text>
  <text x="860" y="530" text-anchor="end" class="field-value">"***"</text>
  <path d="M 370 180 L 420 180" fill="none" stroke="#059669" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="365" y="155" width="60" height="20" rx="4" fill="#ffffff" opacity="0.9"/>
  <text x="395" y="169" text-anchor="middle" class="field-value">解密</text>
  <rect x="60" y="660" width="400" height="25" rx="4" fill="#f8fafc" stroke="#e2e8f0"/>
  <rect x="75" y="667" width="12" height="12" rx="2" fill="#fffbeb" stroke="#fcd34d"/>
  <text x="93" y="677" class="field-value">加密存储</text>
  <rect x="180" y="667" width="12" height="12" rx="2" fill="#f0fdf4" stroke="#86efac"/>
  <text x="198" y="677" class="field-value">解密后</text>
</svg>