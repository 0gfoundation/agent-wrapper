<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 700">
  <defs>
  <style>
    .title { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 20px; font-weight: 600; fill: #1e293b; }
    .section-title { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 16px; font-weight: 600; fill: #1e293b; }
    .field-name { font-family: "SF Mono", Monaco, monospace; font-size: 13px; fill: #334155; }
    .field-type { font-family: "SF Mono", Monaco, monospace; font-size: 11px; fill: #64748b; }
    .field-desc { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 11px; fill: #94a3b8; }
  </style>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.1"/>
  </filter>
</defs>
  <rect width="960" height="700" fill="#ffffff"/>
  <text x="480" y="40" text-anchor="middle" class="title">链上数据结构</text>
  <rect x="60" y="80" width="400" height="520" rx="12" fill="#f0fdf4" stroke="#86efac" stroke-width="2"/>
  <text x="260" y="110" text-anchor="middle" class="section-title">AgentMetadata (On-Chain)</text>
  <rect x="90" y="140" width="340" height="50" rx="6" fill="#ffffff" filter="url(#shadow)"/>
  <text x="110" y="160" class="field-name">agentId</text>
  <text x="110" y="178" class="field-type">uint256</text>
  <text x="400" y="168" text-anchor="end" class="field-desc">代理 ID</text>
  <rect x="90" y="210" width="340" height="50" rx="6" fill="#ffffff" filter="url(#shadow)"/>
  <text x="110" y="230" class="field-name">sealId</text>
  <text x="110" y="248" class="field-type">bytes32</text>
  <text x="400" y="238" text-anchor="end" class="field-desc">64 位十六进制</text>
  <rect x="90" y="280" width="340" height="50" rx="6" fill="#ffffff" filter="url(#shadow)"/>
  <text x="110" y="300" class="field-name">agentSeal</text>
  <text x="110" y="318" class="field-type">address</text>
  <text x="400" y="308" text-anchor="end" class="field-desc">Agent Seal 合约地址</text>
  <rect x="90" y="350" width="340" height="50" rx="6" fill="#ffffff" filter="url(#shadow)"/>
  <text x="110" y="370" class="field-name">intelligentDatas</text>
  <text x="110" y="388" class="field-type">array</text>
  <text x="400" y="378" text-anchor="end" class="field-desc">智能数据列表</text>
  <rect x="100" y="380" width="320" height="200" rx="8" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
  <text x="260" y="405" text-anchor="middle" class="section-title" font-size="14px">IntelligentData Item</text>
  <rect x="120" y="430" width="280" height="45" rx="6" fill="#ffffff"/>
  <text x="140" y="448" class="field-name">dataDescription</text>
  <text x="140" y="464" class="field-type">string</text>
  <text x="380" y="456" text-anchor="end" class="field-desc">描述信息</text>
  <rect x="120" y="500" width="280" height="45" rx="6" fill="#ffffff"/>
  <text x="140" y="518" class="field-name">dataHash</text>
  <text x="140" y="534" class="field-type">bytes32</text>
  <text x="380" y="526" text-anchor="end" class="field-desc">Storage 配置哈希</text>
  <rect x="500" y="80" width="400" height="520" rx="12" fill="#fffbeb" stroke="#fcd34d" stroke-width="2"/>
  <text x="700" y="110" text-anchor="middle" class="section-title">示例数据</text>
  <text x="530" y="150" class="field-name">agentId: "1"</text>
  <text x="530" y="178" class="field-name">sealId: "0x1234...abcd"</text>
  <text x="870" y="178" text-anchor="end" class="field-desc">64 hex characters</text>
  <text x="530" y="206" class="field-name">agentSeal: "0xabcd...1234"</text>
  <text x="870" y="206" text-anchor="end" class="field-desc">合约地址</text>
  <text x="530" y="234" class="field-name">intelligentDatas: [</text>
  <text x="530" y="262" class="field-name">  {</text>
  <text x="530" y="290" class="field-name">    dataDescription: "agent config v1"</text>
  <text x="530" y="318" class="field-name">    dataHash: "0xabcd...5678"</text>
  <text x="530" y="346" class="field-name">  }</text>
  <text x="530" y="374" class="field-name">  {</text>
  <text x="530" y="402" class="field-name">    dataDescription: "knowledge base"</text>
  <text x="530" y="430" class="field-name">    dataHash: "0x9876...4321"</text>
  <text x="530" y="458" class="field-name">  }</text>
  <text x="530" y="486" class="field-name">]</text>
  <rect x="60" y="620" width="400" height="30" rx="4" fill="#f8fafc" stroke="#e2e8f0"/>
  <rect x="75" y="628" width="12" height="12" rx="2" fill="#dcfce7" stroke="#86efac"/>
  <text x="93" y="638" class="field-desc">链上存储</text>
  <rect x="170" y="628" width="12" height="12" rx="2" fill="#fffbeb" stroke="#fcd34d"/>
  <text x="188" y="638" class="field-desc">示例</text>
</svg>