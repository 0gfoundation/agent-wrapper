<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600">
  <defs>
  <style>
    .title { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 20px; font-weight: 600; fill: #1e293b; }
    .node-label { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 14px; font-weight: 500; fill: #1e293b; }
    .node-sub { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 11px; fill: #64748b; }
    .edge-label { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 11px; fill: #475569; }
  </style>
  <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
  </marker>
  <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#059669"/>
  </marker>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.1"/>
  </filter>
</defs>
  <rect width="960" height="600" fill="#ffffff"/>
  <text x="480" y="40" text-anchor="middle" class="title">数据流转图</text>
  <rect x="80" y="260" width="100" height="60" rx="10" fill="#64748b" filter="url(#shadow)"/>
  <text x="130.0" y="285" text-anchor="middle" class="node-label" fill="#ffffff">Start</text>
  <text x="130.0" y="305" text-anchor="middle" class="node-sub" fill="#ffffff" opacity="0.9">sealId</text>
  <rect x="220" y="260" width="120" height="60" rx="10" fill="#3b82f6" filter="url(#shadow)"/>
  <text x="280.0" y="285" text-anchor="middle" class="node-label" fill="#ffffff">Query agentId</text>
  <rect x="380" y="260" width="140" height="60" rx="10" fill="#22c55e" filter="url(#shadow)"/>
  <text x="450.0" y="285" text-anchor="middle" class="node-label" fill="#ffffff">Blockchain</text>
  <text x="450.0" y="305" text-anchor="middle" class="node-sub" fill="#ffffff" opacity="0.9">GET /agents/by-seal-id</text>
  <rect x="560" y="180" width="140" height="60" rx="10" fill="#3b82f6" filter="url(#shadow)"/>
  <text x="630.0" y="205" text-anchor="middle" class="node-label" fill="#ffffff">Query Data</text>
  <text x="630.0" y="225" text-anchor="middle" class="node-sub" fill="#ffffff" opacity="0.9">GET /intelligent-datas</text>
  <rect x="560" y="340" width="140" height="60" rx="10" fill="#3b82f6" filter="url(#shadow)"/>
  <text x="630.0" y="365" text-anchor="middle" class="node-label" fill="#ffffff">Extract</text>
  <text x="630.0" y="385" text-anchor="middle" class="node-sub" fill="#ffffff" opacity="0.9">dataHash[0]</text>
  <rect x="740" y="260" width="140" height="60" rx="10" fill="#f59e0b" filter="url(#shadow)"/>
  <text x="810.0" y="285" text-anchor="middle" class="node-label" fill="#ffffff">Storage</text>
  <text x="810.0" y="305" text-anchor="middle" class="node-sub" fill="#ffffff" opacity="0.9">GET /config/{hash}</text>
  <rect x="740" y="420" width="140" height="60" rx="10" fill="#8b5cf6" filter="url(#shadow)"/>
  <text x="810.0" y="445" text-anchor="middle" class="node-label" fill="#ffffff">Decrypt</text>
  <text x="810.0" y="465" text-anchor="middle" class="node-sub" fill="#ffffff" opacity="0.9">AES-256-GCM</text>
  <rect x="560" y="500" width="280" height="60" rx="10" fill="#ec4899" filter="url(#shadow)"/>
  <text x="700.0" y="525" text-anchor="middle" class="node-label" fill="#ffffff">AgentConfig</text>
  <text x="700.0" y="545" text-anchor="middle" class="node-sub" fill="#ffffff" opacity="0.9">{framework, runtime, env}</text>
  <ellipse cx="130" cy="290" rx="50" ry="30" fill="#64748b" filter="url(#shadow)"/>
  <text x="130" y="295" text-anchor="middle" class="node-label" fill="#ffffff">Start</text>
  <ellipse cx="780" cy="530" rx="60" ry="30" fill="#22c55e" filter="url(#shadow)"/>
  <text x="780" y="535" text-anchor="middle" class="node-label" fill="#ffffff">Complete</text>
  <line x1="180" y1="290" x2="220" y2="290" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-2563eb)"/>
  <line x1="340" y1="290" x2="380" y2="290" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-2563eb)"/>
  <rect x="335.0" y="282.0" width="50" height="16" rx="3" fill="#ffffff" opacity="0.9"/>
  <text x="360.0" y="294.0" text-anchor="middle" class="edge-label">sealId</text>
  <line x1="520" y1="290" x2="560" y2="210" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-2563eb)"/>
  <rect x="515.0" y="242.0" width="50" height="16" rx="3" fill="#ffffff" opacity="0.9"/>
  <text x="540.0" y="254.0" text-anchor="middle" class="edge-label">agentId</text>
  <line x1="630" y1="240" x2="630" y2="340" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-2563eb)"/>
  <line x1="700" y1="370" x2="740" y2="290" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-2563eb)"/>
  <rect x="695.0" y="322.0" width="50" height="16" rx="3" fill="#ffffff" opacity="0.9"/>
  <text x="720.0" y="334.0" text-anchor="middle" class="edge-label">dataHash</text>
  <line x1="810" y1="320" x2="810" y2="420" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-2563eb)"/>
  <rect x="785.0" y="362.0" width="50" height="16" rx="3" fill="#ffffff" opacity="0.9"/>
  <text x="810.0" y="374.0" text-anchor="middle" class="edge-label">encrypted</text>
  <line x1="810" y1="480" x2="780" y2="500" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-2563eb)"/>
  <rect x="770.0" y="482.0" width="50" height="16" rx="3" fill="#ffffff" opacity="0.9"/>
  <text x="795.0" y="494.0" text-anchor="middle" class="edge-label">config</text>
  <rect x="60" y="550" width="300" height="35" rx="4" fill="#f8fafc" stroke="#e2e8f0"/>
  <rect x="75" y="560" width="12" height="12" rx="2" fill="#22c55e"/>
  <text x="93" y="570" class="node-sub">区块链</text>
  <rect x="150" y="560" width="12" height="12" rx="2" fill="#f59e0b"/>
  <text x="168" y="570" class="node-sub">Storage</text>
  <rect x="230" y="560" width="12" height="12" rx="2" fill="#8b5cf6"/>
  <text x="248" y="570" class="node-sub">解密</text>
</svg>