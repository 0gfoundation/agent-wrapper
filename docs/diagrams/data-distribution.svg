<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600">
  <defs>
    <style>
      .title { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 20px; font-weight: 600; fill: #1e293b; }
      .label { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 14px; fill: #334155; }
      .sub-label { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 12px; fill: #64748b; }
      .data-label { font-family: "SF Mono", Monaco, monospace; font-size: 11px; fill: #475569; }
      .section-title { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 16px; font-weight: 600; fill: #1e293b; }
    </style>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#059669"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.1"/>
    </filter>
  </defs>
  <rect width="960" height="600" fill="#ffffff"/>
  <text x="480" y="40" text-anchor="middle" class="title">区块链 Metadata 数据分布架构</text>
  <rect x="60" y="80" width="400" height="460" rx="12" fill="#e8f5e9" stroke="#86efac" stroke-width="2"/>
  <text x="260" y="110" text-anchor="middle" class="section-title">区块链</text>
  <rect x="100" y="140" width="320" height="60" rx="8" fill="#ffffff" filter="url(#shadow)"/>
  <text x="120" y="165" class="label">agentId</text>
  <text x="120" y="185" class="data-label">uint256</text>
  <circle cx="380" cy="170" r="6" fill="#22c55e"/>
  <rect x="100" y="220" width="320" height="60" rx="8" fill="#ffffff" filter="url(#shadow)"/>
  <text x="120" y="245" class="label">sealId</text>
  <text x="120" y="265" class="data-label">bytes32</text>
  <circle cx="380" cy="250" r="6" fill="#22c55e"/>
  <rect x="100" y="300" width="320" height="60" rx="8" fill="#ffffff" filter="url(#shadow)"/>
  <text x="120" y="325" class="label">agentSeal</text>
  <text x="120" y="345" class="data-label">address</text>
  <circle cx="380" cy="330" r="6" fill="#22c55e"/>
  <rect x="100" y="380" width="320" height="60" rx="8" fill="#ffffff" filter="url(#shadow)"/>
  <text x="120" y="405" class="label">dataHash</text>
  <text x="120" y="425" class="data-label">bytes32</text>
  <circle cx="380" cy="410" r="6" fill="#22c55e"/>
  <rect x="500" y="80" width="400" height="460" rx="12" fill="#fff3e0" stroke="#fcd34d" stroke-width="2"/>
  <text x="700" y="110" text-anchor="middle" class="section-title">0G Storage (Off-Chain, Encrypted)</text>
  <rect x="540" y="140" width="320" height="60" rx="8" fill="#ffffff" filter="url(#shadow)"/>
  <text x="560" y="165" class="label">AES-256-GCM 加密配置</text>
  <text x="560" y="185" class="data-label">Encrypted</text>
  <circle cx="820" cy="170" r="6" fill="#f59e0b"/>
  <rect x="540" y="220" width="320" height="60" rx="8" fill="#ffffff" filter="url(#shadow)"/>
  <text x="560" y="245" class="label">Framework</text>
  <text x="560" y="265" class="data-label">{name, version}</text>
  <circle cx="820" cy="250" r="6" fill="#f59e0b"/>
  <rect x="540" y="300" width="320" height="60" rx="8" fill="#ffffff" filter="url(#shadow)"/>
  <text x="560" y="325" class="label">Runtime</text>
  <text x="560" y="345" class="data-label">{entryPoint, workingDir, agentPort}</text>
  <circle cx="820" cy="330" r="6" fill="#f59e0b"/>
  <rect x="540" y="380" width="320" height="60" rx="8" fill="#ffffff" filter="url(#shadow)"/>
  <text x="560" y="405" class="label">Env</text>
  <text x="560" y="425" class="data-label">{key-value pairs}</text>
  <circle cx="820" cy="410" r="6" fill="#f59e0b"/>
  <path d="M 420 420 Q 460 420 460 170 L 500 170" fill="none" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <rect x="400" y="285" width="80" height="20" rx="4" fill="#ffffff" opacity="0.95"/>
  <text x="440" y="299" text-anchor="middle" class="sub-label">通过哈希获取</text>
  <path d="M 700 200 L 700 220" fill="none" stroke="#059669" stroke-width="2" marker-end="url(#arrow-green)"/>
  <path d="M 700 280 L 700 300" fill="none" stroke="#059669" stroke-width="2" marker-end="url(#arrow-green)"/>
  <path d="M 700 360 L 700 380" fill="none" stroke="#059669" stroke-width="2" marker-end="url(#arrow-green)"/>
  <rect x="60" y="560" width="400" height="30" rx="4" fill="#f8fafc" stroke="#e2e8f0"/>
  <circle cx="80" cy="575" r="5" fill="#22c55e"/>
  <text x="92" y="579" class="sub-label">链上数据</text>
  <circle cx="180" cy="575" r="5" fill="#f59e0b"/>
  <text x="192" y="579" class="sub-label">链下加密数据</text>
</svg>